{% extends 'site_queue/base.html' %}

{% load static %}

{% block messages %}
{% endblock %}

{% block content %}
<meta http-equiv="refresh" content="1200">

<div class='container'>

    <h1 style='color: #003e52; font-size: 48px;'>Checking...</h1>
    <br>
    <br>
    <p>
        Please wait while essential checks are completed.
        <br><br>
    </p>

    
</div>

<script src="{{ DJANGO_SETTINGS.QUEUE_URL }}/static/js/django_queue_manager/site-queue-manager.js?ver={{ GIT_COMMIT_HASH }}"></script>
<script>
     if (typeof sitequeuemanager !== "undefined") {
         sitequeuemanager.init('{{ DJANGO_SETTINGS.QUEUE_DOMAIN }}','{{ DJANGO_SETTINGS.QUEUE_URL }}','{{ DJANGO_SETTINGS.QUEUE_ENDPOINT_URL }}','{{ queue_manager_obj.group_unique_key }}','{{ DJANGO_SETTINGS.QUEUE_URL_HOST}}');
     }
</script>
</div>
{% endblock %}
